<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Iglesia Remanente Cali</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;

    /* Fondo: mismo tono oscuro del proyecto */
    background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(201,168,76,0.04) 0%, transparent 55%),
        linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0f0f0f 100%);
}

/* Grain texture overlay */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
}

/* ═══════════════════════════════════════════
   CARD WRAPPER
═══════════════════════════════════════════ */
.login-card {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 100%;
    max-width: 900px;
    min-height: 560px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 32px 80px rgba(0,0,0,0.55),
        0 8px 24px rgba(0,0,0,0.35);
    animation: cardIn .7s cubic-bezier(.22,.68,0,1.2) both;
}

@keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ═══════════════════════════════════════════
   LEFT — FORM PANEL
═══════════════════════════════════════════ */
.form-panel {
    background: #ffffff;
    padding: 56px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
}

/* Logo + branding */
.form-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
}
.form-brand-logo {
    width: 36px; height: 36px;
    border-radius: 50%; object-fit: cover;
    border: 1.5px solid rgba(201,168,76,0.35);
}
.form-brand-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 15px; font-weight: 600;
    color: #0d0d0d; letter-spacing: 0.01em;
    line-height: 1.2;
}
.form-brand-name small {
    display: block;
    font-family: 'Outfit', sans-serif;
    font-size: 10px; font-weight: 400;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #c9a84c;
}

/* Heading */
.form-heading {
    margin-bottom: 36px;
}
.form-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 2.6rem; font-weight: 700;
    color: #0d0d0d; line-height: 1;
    margin-bottom: 8px;
}
.form-subtitle {
    font-size: 13.5px; color: #888;
    font-weight: 300;
}

/* Fields */
.form-fields {
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-bottom: 28px;
}

.field-wrap {
    display: flex;
    flex-direction: column;
    gap: 7px;
}

.field-label {
    font-size: 11.5px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #555;
}

.field-input-wrap {
    position: relative;
    display: flex; align-items: center;
}
.field-input-wrap svg {
    position: absolute; left: 14px;
    width: 16px; height: 16px;
    stroke: #bbb; fill: none;
    stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none;
    transition: stroke .2s;
}

.field-input {
    width: 100%;
    padding: 13px 16px 13px 42px;
    font-family: 'Outfit', sans-serif;
    font-size: 14.5px; font-weight: 400;
    color: #111;
    background: #f7f7f7;
    border: 1.5px solid #e8e8e8;
    border-radius: 10px;
    outline: none;
    transition: border-color .2s, background .2s, box-shadow .2s;
    -webkit-appearance: none;
}
.field-input::placeholder { color: #bbb; }
.field-input:focus {
    background: #fff;
    border-color: #0d0d0d;
    box-shadow: 0 0 0 3px rgba(13,13,13,0.06);
}
.field-input-wrap:focus-within svg { stroke: #0d0d0d; }

/* Submit button */
.btn-login {
    width: 100%;
    padding: 15px 24px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #fff;
    background: #0d0d0d;
    border: none; border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    -webkit-appearance: none;
}
.btn-login:hover {
    background: #222;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.28);
}
.btn-login:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.btn-login svg {
    width: 15px; height: 15px;
    stroke: rgba(255,255,255,0.7); fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    transition: transform .2s;
}
.btn-login:hover svg { transform: translateX(3px); }

/* ═══════════════════════════════════════════
   RIGHT — IMAGE PANEL
═══════════════════════════════════════════ */
.image-panel {
    position: relative;
    background: #111;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 36px;
    text-align: center;
}

/* Subtle gold glow */
.image-panel::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    pointer-events: none;
}

/* Deco grid lines */
.image-panel::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
}

.image-placeholder {
    position: relative; z-index: 1;
    width: 100%;
    aspect-ratio: 3/4;
    max-height: 380px;
    border-radius: 16px;
    border: 1.5px dashed rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.03);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    transition: border-color .3s;
}
.image-placeholder:hover {
    border-color: rgba(201,168,76,0.3);
}

.placeholder-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
}
.placeholder-icon svg {
    width: 24px; height: 24px;
    stroke: rgba(255,255,255,0.25); fill: none;
    stroke-width: 1.4; stroke-linecap: round;
}

.placeholder-text {
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.2);
}
.placeholder-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.1);
    letter-spacing: 0.08em;
}

/* Corner deco — golden brackets */
.corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: rgba(201,168,76,0.35);
    border-style: solid;
}
.corner--tl { top: 12px;  left: 12px;  border-width: 1.5px 0 0 1.5px; border-radius: 3px 0 0 0; }
.corner--tr { top: 12px;  right: 12px; border-width: 1.5px 1.5px 0 0; border-radius: 0 3px 0 0; }
.corner--bl { bottom: 12px; left: 12px;  border-width: 0 0 1.5px 1.5px; border-radius: 0 0 0 3px; }
.corner--br { bottom: 12px; right: 12px; border-width: 0 1.5px 1.5px 0; border-radius: 0 0 3px 0; }

/* Right panel bottom text */
.panel-tagline {
    position: relative; z-index: 1;
    margin-top: 28px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.05rem; font-style: italic;
    color: rgba(255,255,255,0.22);
    line-height: 1.55;
    max-width: 240px;
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 700px) {
    body { padding: 0; align-items: flex-end; }
    .login-card {
        grid-template-columns: 1fr;
        max-width: 100%;
        min-height: auto;
        border-radius: 24px 24px 0 0;
        box-shadow: 0 -12px 48px rgba(0,0,0,0.5);
        animation: cardInMobile .5s ease both;
    }
    @keyframes cardInMobile {
        from { opacity: 0; transform: translateY(40px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .image-panel { display: none; }
    .form-panel { padding: 40px 28px 48px; }
    .form-title { font-size: 2.1rem; }
}
@media (max-width: 480px) {
    .form-panel { padding: 36px 20px 44px; }
}

    </style>
</head>
